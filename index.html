<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="嘻嘻机" />
    <meta name="theme-color" content="#dfdfdd" />
    <link rel="manifest" href="manifest.json" />
    <title>嘻嘻机</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/phone.css" />
    <link rel="stylesheet" href="css/statusbar.css" />
    <link rel="stylesheet" href="css/widget.css" />
    <link rel="stylesheet" href="css/apps.css" />
    <link rel="stylesheet" href="css/dock.css" />
  </head>
  <body>
    <div class="phone-shell">
      <div class="phone-screen" id="phoneScreen">
        <!-- 壁纸层 -->
        <div class="wallpaper-layer" id="wallpaperLayer"></div>

        <!-- 状态栏 -->
        <div class="status-bar">
          <span class="status-time" id="statusTime">00:00</span>
          <div class="status-right">
            <span class="status-signal">
              <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
                <rect
                  x="0"
                  y="7"
                  width="3"
                  height="5"
                  rx="0.8"
                  fill="currentColor"
                  opacity="0.35"
                />
                <rect
                  x="4.5"
                  y="4.5"
                  width="3"
                  height="7.5"
                  rx="0.8"
                  fill="currentColor"
                  opacity="0.6"
                />
                <rect
                  x="9"
                  y="2"
                  width="3"
                  height="10"
                  rx="0.8"
                  fill="currentColor"
                />
                <rect
                  x="13.5"
                  y="0"
                  width="3"
                  height="12"
                  rx="0.8"
                  fill="currentColor"
                />
              </svg>
            </span>
            <span class="status-network">5G</span>
            <span class="status-battery">
              <svg width="25" height="13" viewBox="0 0 25 13" fill="none">
                <rect
                  x="0.5"
                  y="0.5"
                  width="21"
                  height="12"
                  rx="3"
                  stroke="currentColor"
                  stroke-width="1.2"
                />
                <rect
                  x="22.5"
                  y="4"
                  width="2"
                  height="5"
                  rx="1"
                  fill="currentColor"
                  opacity="0.4"
                />
                <rect
                  x="1.5"
                  y="1.5"
                  width="16"
                  height="10"
                  rx="2"
                  fill="currentColor"
                />
              </svg>
            </span>
          </div>
        </div>

        <!-- 灵动岛 -->
        <div class="dynamic-island"></div>

        <!-- 主屏内容 -->
        <div class="screen-content">
          <!-- ══ 顶部信息卡小组件 ══ -->
          <div class="top-widget glass-widget" id="topWidget">
            <div class="tw-row tw-profile">
              <!-- 头像 -->
              <label class="tw-avatar" id="twAvatar" title="点击更换头像">
                <svg id="avatarPlaceholder" viewBox="0 0 40 40" fill="none">
                  <circle
                    cx="20"
                    cy="15"
                    r="7"
                    stroke="#aaa"
                    stroke-width="1.5"
                  />
                  <path
                    d="M6 36c0-7.732 6.268-14 14-14s14 6.268 14 14"
                    stroke="#aaa"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                </svg>
                <img id="avatarImg" class="avatar-img hidden" alt="头像" />
                <input
                  type="file"
                  accept="image/*"
                  id="avatarInput"
                  class="hidden-input"
                />
              </label>

              <!-- 格言 -->
              <div class="tw-motto-wrap">
                <span
                  class="tw-motto editable"
                  id="twMotto"
                  contenteditable="true"
                  data-key="motto"
                  data-default="幸好爱是小小的奇迹"
                  spellcheck="false"
                ></span>
              </div>

              <!-- 装饰图标 -->
              <div class="tw-icon-btn">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle
                    cx="9"
                    cy="7"
                    r="3"
                    stroke="currentColor"
                    stroke-width="1.4"
                  />
                  <circle
                    cx="15"
                    cy="7"
                    r="3"
                    stroke="currentColor"
                    stroke-width="1.4"
                  />
                  <path
                    d="M3 19c0-3.314 2.686-6 6-6h6c3.314 0 6 2.686 6 6"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
            </div>

            <!-- Baby行 -->
            <div class="tw-row tw-info-row">
              <span class="tw-label">Baby</span>
              <span
                class="tw-value editable"
                id="twBaby"
                contenteditable="true"
                data-key="baby"
                data-default="call Aero"
                spellcheck="false"
              ></span>
            </div>

            <!-- Contact行 -->
            <div class="tw-row tw-info-row">
              <span class="tw-label">Contact</span>
              <span
                class="tw-value editable"
                id="twContact"
                contenteditable="true"
                data-key="contact"
                data-default="http// > Aero's love.com"
                spellcheck="false"
              ></span>
            </div>
          </div>

          <!-- ══ 双列图片小组件 ══ -->
          <div class="small-widgets-row">
            <!-- 左侧：带回形针 -->
            <div class="small-widget sw-left glass-widget">
              <div class="sw-clip">
                <svg viewBox="0 0 12 30" fill="none">
                  <path
                    d="M6 2C3.8 2 2 3.8 2 6v16c0 3.3 2.7 6 6 6s6-2.7 6-6V8c0-2.2-1.8-4-4-4S6 5.8 6 8v13"
                    stroke="#aaa"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <label class="sw-img-area" id="swLeftArea" title="点击更换图片">
                <div class="sw-placeholder" id="swLeftPlaceholder">
                  <svg viewBox="0 0 24 24" fill="none">
                    <rect
                      x="3"
                      y="3"
                      width="18"
                      height="18"
                      rx="2"
                      stroke="#bbb"
                      stroke-width="1.2"
                    />
                    <path
                      d="M3 16l5-5 4 4 3-3 6 6"
                      stroke="#bbb"
                      stroke-width="1.2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <circle
                      cx="8.5"
                      cy="8.5"
                      r="1.5"
                      stroke="#bbb"
                      stroke-width="1.2"
                    />
                  </svg>
                  <span>点击添加图片</span>
                </div>
                <img id="swLeftImg" class="sw-img hidden" alt="" />
                <input
                  type="file"
                  accept="image/*"
                  id="swLeftInput"
                  class="hidden-input"
                />
              </label>
              <div class="sw-caption-area">
                <span
                  class="sw-caption editable"
                  id="swLeftCaption"
                  contenteditable="true"
                  data-key="sw_left_caption"
                  data-default="First Choice"
                  spellcheck="false"
                ></span>
              </div>
            </div>

            <!-- 右侧：纯图片（虚线边框风格） -->
            <div class="small-widget sw-right glass-widget sw-right-dashed">
              <label class="sw-img-area" id="swRightArea" title="点击更换图片">
                <div class="sw-placeholder" id="swRightPlaceholder">
                  <svg viewBox="0 0 24 24" fill="none">
                    <rect
                      x="3"
                      y="3"
                      width="18"
                      height="18"
                      rx="2"
                      stroke="#bbb"
                      stroke-width="1.2"
                      stroke-dasharray="3 2"
                    />
                    <path
                      d="M3 16l5-5 4 4 3-3 6 6"
                      stroke="#bbb"
                      stroke-width="1.2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <circle
                      cx="8.5"
                      cy="8.5"
                      r="1.5"
                      stroke="#bbb"
                      stroke-width="1.2"
                    />
                  </svg>
                  <span>点击添加图片</span>
                </div>
                <img id="swRightImg" class="sw-img hidden" alt="" />
                <input
                  type="file"
                  accept="image/*"
                  id="swRightInput"
                  class="hidden-input"
                />
              </label>
            </div>
          </div>

          <!-- 页码指示条 -->
          <div class="page-dot"><span></span></div>

          <!-- ══ 6个APP图标：两行三列 ══ -->
          <!-- 聊天、世界书已在Dock，此处不重复 -->
          <div class="app-grid" id="appGrid">
            <!-- 心声 -->
            <div class="app-item" data-app="voice">
              <div class="app-icon glass-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M12 21.593c-5.63-5.539-11-10.297-11-14.402
                       0-3.791 3.068-5.191 5.281-5.191
                       1.312 0 4.151.501 5.719 4.457
                       1.59-3.968 4.464-4.447 5.726-4.447
                       2.54 0 5.274 1.621 5.274 5.181
                       0 4.069-5.136 8.625-11 14.402z"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </div>
              <span class="app-label">心声</span>
            </div>

            <!-- 论坛 -->
            <div class="app-item" data-app="forum">
              <div class="app-icon glass-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a2 2 0 01-2-2"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M15 3H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l4-4h4a2 2 0
                       002-2V5a2 2 0 00-2-2z"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </div>
              <span class="app-label">论坛</span>
            </div>

            <!-- 小芽日记 -->
            <div class="app-item" data-app="diary">
              <div class="app-icon glass-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <polyline
                    points="14 2 14 8 20 8"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <line
                    x1="8"
                    y1="13"
                    x2="16"
                    y2="13"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                  />
                  <line
                    x1="8"
                    y1="17"
                    x2="12"
                    y2="17"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                  />
                  <path
                    d="M10 9c0-1 1.5-2 2-3"
                    stroke="currentColor"
                    stroke-width="1.2"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <span class="app-label">小芽日记</span>
            </div>

            <!-- 街の声 -->
            <div class="app-item" data-app="street">
              <div class="app-icon glass-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M3 18l4-8 4 5 3-3 4 6"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="17"
                    cy="5"
                    r="2"
                    stroke="currentColor"
                    stroke-width="1.4"
                  />
                  <line
                    x1="3"
                    y1="21"
                    x2="21"
                    y2="21"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <span class="app-label">街の声</span>
            </div>

            <!-- 糖果铺 -->
            <div class="app-item" data-app="candy">
              <div class="app-icon glass-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M9.5 2a4.5 4.5 0 000 9h5a4.5 4.5 0 000-9h-5z"
                    stroke="currentColor"
                    stroke-width="1.4"
                  />
                  <path
                    d="M9.5 11v9a2 2 0 002 2h1a2 2 0 002-2v-9"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                  />
                  <line
                    x1="7"
                    y1="15"
                    x2="17"
                    y2="15"
                    stroke="currentColor"
                    stroke-width="1.2"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <span class="app-label">糖果铺</span>
            </div>

            <!-- 音乐 -->
            <div class="app-item" data-app="music">
              <div class="app-icon glass-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M9 18V5l12-2v13"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="6"
                    cy="18"
                    r="3"
                    stroke="currentColor"
                    stroke-width="1.4"
                  />
                  <circle
                    cx="18"
                    cy="16"
                    r="3"
                    stroke="currentColor"
                    stroke-width="1.4"
                  />
                </svg>
              </div>
              <span class="app-label">音乐</span>
            </div>
          </div>
          <!-- /app-grid -->
        </div>
        <!-- /screen-content -->

        <!-- ══ Dock ══ -->
        <div class="dock-bar">
          <div class="dock-inner glass-dock">
            <!-- 聊天 -->
            <div class="dock-item" data-app="chat">
              <div class="dock-icon glass-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </div>
              <span class="dock-label">聊天</span>
            </div>

            <!-- 世界书 -->
            <div class="dock-item" data-app="worldbook">
              <div class="dock-icon glass-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle
                    cx="12"
                    cy="12"
                    r="9"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                  <path
                    d="M12 3c0 0-4 3.5-4 9s4 9 4 9"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                  <path
                    d="M12 3c0 0 4 3.5 4 9s-4 9-4 9"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                  <line
                    x1="3"
                    y1="12"
                    x2="21"
                    y2="12"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                  <line
                    x1="4.5"
                    y1="7.5"
                    x2="19.5"
                    y2="7.5"
                    stroke="currentColor"
                    stroke-width="1.2"
                    stroke-linecap="round"
                  />
                  <line
                    x1="4.5"
                    y1="16.5"
                    x2="19.5"
                    y2="16.5"
                    stroke="currentColor"
                    stroke-width="1.2"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <span class="dock-label">世界书</span>
            </div>

            <!-- 设置 -->
            <div class="dock-item" data-app="settings">
              <div class="dock-icon glass-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle
                    cx="12"
                    cy="12"
                    r="3"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                  <path
                    d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83
                       2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33
                       1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09
                       A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06
                       a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06
                       A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3
                       a2 2 0 010-4h.09A1.65 1.65 0 004.6 9
                       a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83
                       2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68
                       a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09
                       a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06
                       a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06
                       A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21
                       a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <span class="dock-label">设置</span>
            </div>
          </div>
          <div class="dock-home-indicator"></div>
        </div>
      </div>
      <!-- /phone-screen -->
    </div>
    <!-- /phone-shell -->

    <!-- 未开发弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-card glass-widget">
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="#bbb" stroke-width="1.4" />
            <line
              x1="12"
              y1="8"
              x2="12"
              y2="12"
              stroke="#bbb"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <circle cx="12" cy="16" r="0.9" fill="#bbb" />
          </svg>
        </div>
        <p class="modal-title">建设中</p>
        <p class="modal-desc">
          「<span id="modalAppName"></span>」正在开发，敬请期待
        </p>
        <button class="modal-btn" id="modalClose">知道了</button>
      </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/widget.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
